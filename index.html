<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GODITJA — Lajme</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --ink:#181a1f;
    --paper:#f6f3ec;
    --accent:#d94a34;
    --accent-dim:#a83324;
    --line: rgba(24,26,31,0.14);
    --card: #ffffff;
    --sub: #55504a;
    --shadow: 0 10px 30px rgba(24,26,31,0.08);
    --radius: 4px;
  }
  [data-theme="dark"]{
    --ink:#f6f3ec;
    --paper:#0e1015;
    --accent:#ff6a51;
    --accent-dim:#ff8873;
    --line: rgba(246,243,236,0.16);
    --card:#1b1e26;
    --sub:#b8b3a8;
    --shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Source Sans 3',sans-serif;
    font-size:16px;
    overflow:hidden;
    transition:background .35s ease, color .35s ease;
  }

  .app{
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
    max-width:480px;
    margin:0 auto;
    position:relative;
    border-left:1px solid var(--line);
    border-right:1px solid var(--line);
  }

  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 20px 10px;
    flex-shrink:0;
  }
  .logo{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:23px;
    letter-spacing:0.3px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .logo-mark{
    width:38px;height:38px;
    flex-shrink:0;
  }
  .logo-text{ display:flex; flex-direction:column; line-height:1; gap:3px; }
  .logo-text b{ display:flex; align-items:baseline; gap:6px; }
  .logo span{color:var(--accent);}
  .logo small{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--sub);
    font-weight:400;
    letter-spacing:1.2px;
    text-transform:uppercase;
  }
  .theme-toggle{
    width:40px;height:40px;
    border-radius:50%;
    border:1px solid var(--line);
    background:var(--card);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    color:var(--ink);
    font-size:17px;
    transition:transform .2s ease;
  }
  .theme-toggle:active{transform:scale(0.9);}

  .ticker-wrap{
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
    background:var(--accent);
    overflow:hidden;
    flex-shrink:0;
    height:32px;
    display:flex;
    align-items:center;
  }
  .ticker-tag{
    background:var(--ink);
    color:var(--paper);
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    font-weight:700;
    letter-spacing:1px;
    padding:0 10px;
    height:100%;
    display:flex;
    align-items:center;
    flex-shrink:0;
    z-index:2;
  }
  .ticker-track{
    display:flex;
    white-space:nowrap;
    animation:scroll 24s linear infinite;
  }
  .ticker-track span{
    color:#fff;
    font-size:13px;
    font-weight:600;
    padding:0 28px;
    font-family:'Source Sans 3',sans-serif;
  }
  @keyframes scroll{
    0%{transform:translateX(0);}
    100%{transform:translateX(-50%);}
  }

  #homeView{
    display:flex;
    flex-direction:column;
    flex:1;
    min-height:0;
  }

  .rail{
    display:flex;
    gap:8px;
    padding:14px 20px;
    overflow-x:auto;
    flex-shrink:0;
    scrollbar-width:none;
  }
  .rail::-webkit-scrollbar{display:none;}
  .cat-btn{
    font-family:'Oswald',sans-serif;
    font-size:14px;
    font-weight:500;
    letter-spacing:0.3px;
    padding:9px 17px;
    border-radius:999px;
    border:1px solid var(--line);
    background:transparent;
    color:var(--sub);
    cursor:pointer;
    white-space:nowrap;
    transition:all .25s ease;
  }
  .cat-btn.active{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }

  .stage{
    flex:1;
    min-height:0;
    position:relative;
    overflow:hidden;
    touch-action:pan-y;
  }
  .pages{
    display:flex;
    height:100%;
    min-height:0;
    transition:transform .38s cubic-bezier(.22,.68,0,1.01);
  }
  .page{
    min-width:100%;
    height:100%;
    min-height:0;
    overflow-y:auto;
    padding:6px 20px 110px;
    -webkit-overflow-scrolling:touch;
    touch-action:pan-y;
  }
  .page::-webkit-scrollbar{display:none;}

  .section-label{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:1.8px;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:500;
    margin:18px 0 10px;
  }

  .hero-card{
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    overflow:hidden;
    margin-bottom:22px;
    border:1px solid var(--line);
    position:relative;
  }
  .hero-img{
    height:190px;
    background-size:cover;
    background-position:center;
    position:relative;
  }
  .hero-img::after{
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.55));
  }
  .hero-badge{
    position:absolute; top:12px; left:12px;
    background:var(--accent);
    color:#fff;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    font-weight:700;
    letter-spacing:1px;
    padding:5px 11px;
    border-radius:2px;
    z-index:2;
  }
  .save-btn{
    position:absolute; top:10px; right:10px;
    width:34px;height:34px;
    border-radius:50%;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(4px);
    display:flex;align-items:center;justify-content:center;
    color:#fff;
    font-size:16px;
    cursor:pointer;
    z-index:3;
    border:none;
    transition:transform .15s ease, background .2s ease;
  }
  .save-btn:active{transform:scale(0.85);}
  .save-btn.saved{ color:var(--accent); background:rgba(255,255,255,0.92);}
  .hero-body{padding:17px 18px 19px;}
  .hero-title{
    font-family:'Oswald',sans-serif;
    font-size:21px;
    font-weight:600;
    line-height:1.3;
    margin:0 0 9px;
    letter-spacing:0.1px;
  }
  .hero-meta{
    display:flex;
    gap:12px;
    font-size:13px;
    color:var(--sub);
    font-family:'JetBrains Mono',monospace;
  }
  .hero-desc{
    font-size:14.5px;
    line-height:1.55;
    color:var(--sub);
    margin:0 0 10px;
  }

  .story{
    display:flex;
    gap:14px;
    padding:15px 0;
    border-bottom:1px solid var(--line);
    position:relative;
  }
  .story:last-child{border-bottom:none;}
  .story-thumb{
    width:82px;height:82px;
    flex-shrink:0;
    border-radius:var(--radius);
    background-size:cover;
    background-position:center;
    border:1px solid var(--line);
  }
  .story-body{flex:1; min-width:0; padding-right:30px; position:relative;}
  .story-cat{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--accent);
    letter-spacing:1px;
    text-transform:uppercase;
    font-weight:700;
  }
  .story-title{
    font-family:'Oswald',sans-serif;
    font-size:16px;
    font-weight:500;
    line-height:1.35;
    margin:5px 0 7px;
  }
  .story-time{
    font-size:12px;
    color:var(--sub);
    font-family:'JetBrains Mono',monospace;
  }
  .story .save-btn{
    position:absolute;
    top:0; right:-6px;
    width:28px;height:28px;
    background:transparent;
    color:var(--sub);
    backdrop-filter:none;
    font-size:15px;
  }
  .story .save-btn.saved{ color:var(--accent); background:transparent;}

  .view{
    display:none;
    flex:1;
    min-height:0;
    overflow-y:auto;
    padding:6px 20px 110px;
  }
  .view.visible{display:block;}
  .search-box{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:999px;
    padding:12px 18px;
    margin:14px 0 8px;
  }
  .search-box input{
    border:none;
    outline:none;
    background:transparent;
    font-family:'Source Sans 3',sans-serif;
    font-size:16px;
    color:var(--ink);
    width:100%;
  }
  .search-box input::placeholder{color:var(--sub);}
  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--sub);
  }
  .empty-state .icon{font-size:38px; margin-bottom:12px;}
  .empty-state p{font-size:15px; line-height:1.5; margin:0;}

  .bottomnav{
    position:absolute;
    bottom:0; left:0; right:0;
    display:flex;
    justify-content:space-around;
    padding:12px 10px calc(12px + env(safe-area-inset-bottom));
    background:var(--paper);
    border-top:1px solid var(--line);
    z-index:5;
  }
  .nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    color:var(--sub);
    font-size:11px;
    font-weight:600;
    font-family:'JetBrains Mono',monospace;
    letter-spacing:0.4px;
    cursor:pointer;
    transition:color .2s;
    background:none;
    border:none;
  }
  .nav-item.active{color:var(--accent);}
  .nav-icon{font-size:19px;}

  .dots{
    display:flex;
    justify-content:center;
    gap:6px;
    padding:4px 0 14px;
    flex-shrink:0;
  }
  .dot{
    width:5px;height:5px;
    border-radius:50%;
    background:var(--line);
    transition:all .3s ease;
  }
  .dot.active{
    background:var(--accent);
    width:16px;
    border-radius:3px;
  }

  .swipe-hint{
    position:absolute;
    bottom:20px; left:50%;
    transform:translateX(-50%);
    background:var(--ink);
    color:var(--paper);
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;
    padding:8px 14px;
    border-radius:999px;
    opacity:0.92;
    pointer-events:none;
    z-index:10;
    animation: hintfade 3.2s ease forwards;
    white-space:nowrap;
  }
  @keyframes hintfade{
    0%{opacity:0; transform:translate(-50%,8px);}
    15%{opacity:0.95; transform:translate(-50%,0);}
    80%{opacity:0.95;}
    100%{opacity:0;}
  }
</style>
</head>

let saved = new Set(loadSaved());

function loadSaved(){
  try{
    const raw = localStorage.getItem('goditja_saved');
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}
function persistSaved(){
  try{
    localStorage.setItem('goditja_saved', JSON.stringify([...saved]));
  }catch(e){ /* storage unavailable, fail silently */ }
}

const ALL_ARTICLES = [];
CATS.forEach(c=>{
  const d = DATA[c];
  ALL_ARTICLES.push({...d.hero, category:c, isHero:true});
  d.list.forEach(s=> ALL_ARTICLES.push({...s, category:c, isHero:false}));
});

function buildTicker(){
  const headlines = CATS.map(c => DATA[c].hero.title);
  const full = headlines.concat(headlines).map(h => `<span>● ${h}</span>`).join('');
  tickerTrack.innerHTML = full;
}

function renderRail(){
  railEl.innerHTML = CATS.map((c,i) =>
    `<button class="cat-btn ${i===current?'active':''}" data-i="${i}">${c}</button>`
  ).join('');
  railEl.querySelectorAll('.cat-btn').forEach(btn=>{
    btn.addEventListener('click', ()=> goTo(parseInt(btn.dataset.i)));
  });
}

function saveIcon(id){ return saved.has(id) ? '★' : '☆'; }

function renderPages(){
  pagesEl.innerHTML = CATS.map(c => {
    const d = DATA[c];
    return `
      <div class="page">
        <div class="section-label">${c} — sot</div>
        <div class="hero-card">
          <div class="hero-img" style="background-image:url('${d.hero.img}')">
            <div class="hero-badge">${d.hero.badge}</div>
            <button class="save-btn ${saved.has(d.hero.id)?'saved':''}" data-id="${d.hero.id}">${saveIcon(d.hero.id)}</button>
          </div>
          <div class="hero-body">
            <div class="hero-title">${d.hero.title}</div>
            <div class="hero-desc">${d.hero.desc}</div>
            <div class="hero-meta"><span>${d.hero.src}</span></div>
          </div>
        </div>
        <div class="section-label">Më shumë ${c.toLowerCase()}</div>
        ${d.list.map(s=>`
          <div class="story">
            <div class="story-thumb" style="background-image:url('${s.img}')"></div>
            <div class="story-body">
              <div class="story-cat">${s.cat}</div>
              <div class="story-title">${s.title}</div>
              <button class="save-btn ${saved.has(s.id)?'saved':''}" data-id="${s.id}">${saveIcon(s.id)}</button>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }).join('');
  attachSaveHandlers(pagesEl);
}

function attachSaveHandlers(container){
  container.querySelectorAll('.save-btn').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      toggleSave(btn.dataset.id);
    });
  });
}

function toggleSave(id){
  if(saved.has(id)) saved.delete(id); else saved.add(id);
  persistSaved();
  renderPages();
  renderSaved();
  renderSearch(document.getElementById('searchInput').value);
}

function renderDots(){
  dotsEl.innerHTML = CATS.map((_,i)=>`<div class="dot ${i===current?'active':''}"></div>`).join('');
}

function goTo(i){
  current = Math.max(0, Math.min(CATS.length-1, i));
  pagesEl.style.transform = `translateX(-${current*100}%)`;
  renderRail();
  renderDots();
}

function articleCardHTML(a){
  return `
    <div class="story">
      <div class="story-thumb" style="background-image:url('${a.img}')"></div>
      <div class="story-body">
        <div class="story-cat">${a.cat || a.badge}</div>
        <div class="story-title">${a.title}</div>
        <div class="story-time">${a.category}</div>
        <button class="save-btn ${saved.has(a.id)?'saved':''}" data-id="${a.id}">${saveIcon(a.id)}</button>
      </div>
    </div>
  `;
}

function renderSaved(){
  const list = document.getElementById('savedList');
  const savedArticles = ALL_ARTICLES.filter(a=>saved.has(a.id));
  if(savedArticles.length===0){
    list.innerHTML = `<div class="empty-state"><div class="icon">☆</div><p>Nuk ke lajme të ruajtura ende.<br>Prek ikonën ☆ te çdo lajm për ta ruajtur këtu.</p></div>`;
  } else {
    list.innerHTML = savedArticles.map(articleCardHTML).join('');
  }
  attachSaveHandlers(list);
}

function renderSearch(query=''){
  const results = document.getElementById('searchResults');
  const q = query.trim().toLowerCase();
  if(q===''){
    results.innerHTML = `<div class="empty-state"><div class="icon">⌕</div><p>Shkruaj për të kërkuar lajme —<br>p.sh. "Yamal", "Sach Pizza", "Botëror".</p></div>`;
    return;
  }
  const matches = ALL_ARTICLES.filter(a => a.title.toLowerCase().includes(q) || (a.cat||'').toLowerCase().includes(q) || a.category.toLowerCase().includes(q));
  if(matches.length===0){
    results.innerHTML = `<div class="empty-state"><div class="icon">∅</div><p>Asnjë lajm nuk u gjet për "${query}".</p></div>`;
  } else {
    results.innerHTML = matches.map(articleCardHTML).join('');
  }
  attachSaveHandlers(results);
}

renderRail();
renderPages();
renderDots();
buildTicker();
renderSaved();
renderSearch();
goTo(0);

let startX=0, startY=0, deltaX=0;
const stage = document.getElementById('stage');

/* touch: only read start/end points, never touch the DOM mid-move,
   so native vertical scrolling inside .page is never blocked */
stage.addEventListener('touchstart', e=>{
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
}, {passive:true});

stage.addEventListener('touchend', e=>{
  const t = e.changedTouches[0];
  const dx = t.clientX - startX;
  const dy = t.clientY - startY;
  if(Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy)){
    if(dx < 0) goTo(current+1); else goTo(current-1);
  }
}, {passive:true});
/* No mouse-drag swipe on desktop — it risked hijacking normal wheel/
   trackpad scrolling. Desktop users switch categories via the tab rail. */

const themeToggle = document.getElementById('themeToggle');

function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  themeToggle.textContent = theme === 'dark' ? '☀' : '☾';
}

/* restore saved theme on load (defaults to light if none saved) */
try{
  const savedTheme = localStorage.getItem('goditja_theme');
  if(savedTheme) applyTheme(savedTheme);
}catch(e){ /* storage unavailable, fail silently */ }

themeToggle.addEventListener('click', ()=>{
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  applyTheme(next);
  try{ localStorage.setItem('goditja_theme', next); }catch(e){ /* fail silently */ }
});

const navItems = document.querySelectorAll('.nav-item');
const homeView = document.getElementById('homeView');
const savedView = document.getElementById('savedView');
const searchView = document.getElementById('searchView');

function showView(name){
  const target = name==='profile' ? 'home' : name;
  navItems.forEach(n=> n.classList.toggle('active', n.dataset.view===target));
  homeView.style.display = target==='home' ? 'flex' : 'none';
  savedView.classList.toggle('visible', target==='saved');
  searchView.classList.toggle('visible', target==='search');
  if(target==='saved') renderSaved();
  if(target==='search') setTimeout(()=>document.getElementById('searchInput').focus(), 50);
}

navItems.forEach(item=>{
  item.addEventListener('click', ()=> showView(item.dataset.view));
});

document.getElementById('searchInput').addEventListener('input', (e)=>{
  renderSearch(e.target.value);
});
</script>

</body>
</html>
